<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luyện tập KET Reading Part 4</title>
<style>
  :root {
    --bg: #f1f5f9; --card: #ffffff; --ink: #1e293b; --muted: #64748b;
    --line: #e2e8f0; --brand: #2563eb; --brand-dark: #1d4ed8;
    --ok: #16a34a; --ok-bg: #dcfce7; --bad: #dc2626; --bad-bg: #fee2e2;
    --warn-bg: #fff7ed; --warn-line: #fdba74;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, "Segoe UI", Roboto, system-ui, sans-serif; background: var(--bg); color: var(--ink); line-height: 1.55; }
  header { background: linear-gradient(135deg, #1e3a8a, #2563eb); color: #fff; padding: 20px; text-align: center; }
  header h1 { margin: 0 0 4px; font-size: 22px; }
  header p { margin: 0; opacity: .85; font-size: 14px; }
  .wrap { max-width: 1000px; margin: 0 auto; padding: 16px; }

  .toolbar { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .picker { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  select, button { font: inherit; border-radius: 8px; border: 1px solid var(--line); padding: 8px 12px; background: #fff; cursor: pointer; }
  a.back { text-decoration: none; color: var(--muted); font-size: 14px; }
  button.primary { background: var(--brand); color: #fff; border-color: var(--brand); font-weight: 600; }
  button.primary:hover { background: var(--brand-dark); }
  button.ghost:hover { background: #f8fafc; }
  button:disabled { opacity: .5; cursor: not-allowed; }
  .progress-bar { height: 6px; background: var(--line); border-radius: 99px; overflow: hidden; margin-bottom: 16px; }
  .progress-bar > div { height: 100%; background: var(--brand); width: 0; transition: width .3s; }

  .card { background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 18px; margin-bottom: 16px; box-shadow: 0 1px 3px rgba(0,0,0,.04); }
  .card h2 { margin: 0 0 2px; font-size: 19px; }
  .typetag { display: inline-block; font-size: 12px; font-weight: 600; padding: 2px 10px; border-radius: 99px; background: #e0e7ff; color: #3730a3; margin-bottom: 12px; }

  .readgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; align-items: start; }
  .colhead { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); padding-bottom: 8px; border-bottom: 2px solid var(--line); margin-bottom: 10px; }
  .passage { position: sticky; top: 12px; }
  .passage .body { font-size: 14.5px; white-space: pre-line; background: #f8fafc; border: 1px solid var(--line); border-radius: 10px; padding: 14px; max-height: 70vh; overflow: auto; }

  .q { padding: 14px 0; border-top: 1px solid var(--line); }
  .q:first-of-type { border-top: none; padding-top: 0; }
  .qhead { font-size: 15px; }
  .qhead .n { color: var(--brand); font-weight: 700; margin-right: 6px; }
  .qvi { font-size: 13px; color: var(--muted); margin: 2px 0 8px; font-style: italic; }
  body.vi-hidden .qvi { display: none; }
  button.toggle.on { background: var(--brand); color: #fff; border-color: var(--brand); }
  .opts { display: flex; flex-wrap: wrap; gap: 8px; }
  .opt { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border: 1px solid var(--line); border-radius: 99px; font-size: 14px; cursor: pointer; background: #fff; user-select: none; }
  .opt .L { font-weight: 700; color: var(--brand); }
  .opt:hover { background: #f1f5f9; }
  .opt.sel { background: #eff6ff; border-color: var(--brand); }
  .opt.correct { background: var(--ok-bg); border-color: var(--ok); }
  .opt.correct .L { color: var(--ok); }
  .opt.wrong { background: var(--bad-bg); border-color: var(--bad); }
  .opt.wrong .L { color: var(--bad); }
  .verdict { font-size: 13px; margin-top: 8px; }
  .verdict.ok { color: var(--ok); }
  .verdict.bad { color: var(--bad); }
  .explain { font-size: 13px; color: var(--muted); margin-top: 6px; background: var(--warn-bg); border: 1px solid var(--warn-line); border-radius: 8px; padding: 6px 10px; display: none; }

  .result { display: none; text-align: center; padding: 16px; border-radius: 12px; margin-bottom: 16px; font-weight: 600; }
  .result.show { display: block; }
  .result.good { background: var(--ok-bg); color: var(--ok); }
  .result.mid { background: var(--warn-bg); color: #c2410c; }

  .nav { display: flex; justify-content: space-between; gap: 8px; }
  footer { text-align: center; color: var(--muted); font-size: 12px; padding: 24px 0; }
  @media (max-width: 720px) {
    .readgrid { grid-template-columns: 1fr; gap: 16px; }
    .passage { position: static; }
    .passage .body { max-height: none; }
  }
</style>
</head>
<body>
<header>
  <h1>Luyện tập KET Reading Part 4</h1>
  <p>Đọc đoạn văn (bản dịch) rồi trả lời câu hỏi tiếng Anh</p>
</header>

<div class="wrap">
  <div class="toolbar">
    <div class="picker">
      <a class="back" href="../index.html">← Trang chủ</a>
      <label for="exSel">Bài:</label>
      <select id="exSel"></select>
    </div>
    <div class="picker">
      <button class="toggle" id="viToggle" title="Ẩn/hiện nghĩa tiếng Việt của câu hỏi">🇻🇳 Nghĩa câu hỏi</button>
      <span id="scoreTag" style="font-size:14px;color:var(--muted)"></span>
    </div>
  </div>
  <div class="progress-bar"><div id="prog"></div></div>

  <div class="result" id="result"></div>
  <div class="card" id="quizCard"></div>

  <div class="nav">
    <button class="ghost" id="prevBtn">← Bài trước</button>
    <button class="primary" id="checkBtn">Kiểm tra đáp án</button>
    <button class="ghost" id="nextBtn">Bài sau →</button>
  </div>

  <footer>18 bài đọc KET Reading Part 4 · Bản dịch làm đề · Mở offline được</footer>
</div>

<script src="data.js"></script>
<script>
  const $ = (s) => document.querySelector(s);
  let idx = 0;
  const exSel = $("#exSel");
  DATA.forEach((ex, i) => {
    const o = document.createElement("option");
    o.value = i; o.textContent = "Bài " + ex.id + " — " + ex.title;
    exSel.appendChild(o);
  });

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, m => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[m]));
  }

  function render() {
    const ex = DATA[idx];
    exSel.value = idx;
    $("#result").className = "result";
    $("#prog").style.width = ((idx + 1) / DATA.length * 100) + "%";
    $("#prevBtn").disabled = idx === 0;
    $("#nextBtn").disabled = idx === DATA.length - 1;
    $("#checkBtn").textContent = "Kiểm tra đáp án";

    const typeLabel = ex.type === "who"
      ? "Dạng: Chọn nhân vật (Who…?)"
      : "Dạng: Right / Wrong / Doesn't say";

    let q = `<h2>Bài ${ex.id}: ${escapeHtml(ex.title)}</h2>
      <span class="typetag">${typeLabel}</span>
      <div class="readgrid">
        <div class="passage">
          <div class="colhead">📖 Đoạn đọc (bản dịch)</div>
          <div class="body">${escapeHtml(ex.passage)}</div>
        </div>
        <div class="questions">
          <div class="colhead">❓ Câu hỏi (Questions 21–27)</div>`;

    ex.questions.forEach(it => {
      const opts = ["A", "B", "C"].map(L =>
        `<span class="opt" data-q="${it.n}" data-l="${L}"><span class="L">${L}</span>${escapeHtml(ex.options[L])}</span>`
      ).join("");
      q += `<div class="q" data-q="${it.n}">
        <div class="qhead"><span class="n">${it.n}.</span>${escapeHtml(it.q)}</div>
        ${it.qvi ? `<div class="qvi">${escapeHtml(it.qvi)}</div>` : ""}
        <div class="opts">${opts}</div>
        <div class="verdict" data-v></div>
        <div class="explain" data-x></div>
      </div>`;
    });

    q += `</div></div>`;
    const card = $("#quizCard");
    card.innerHTML = q;

    // chon dap an
    card.querySelectorAll(".opt").forEach(op => {
      op.addEventListener("click", () => {
        if (op.classList.contains("locked")) return;
        const qn = op.getAttribute("data-q");
        card.querySelectorAll(`.opt[data-q="${qn}"]`).forEach(o => o.classList.remove("sel"));
        op.classList.add("sel");
      });
    });

    updateScoreTag();
  }

  function check() {
    const ex = DATA[idx];
    const card = $("#quizCard");
    let correct = 0;

    ex.questions.forEach(it => {
      const qrow = card.querySelector(`.q[data-q="${it.n}"]`);
      const sel = qrow.querySelector(".opt.sel");
      const v = qrow.querySelector("[data-v]");
      const x = qrow.querySelector("[data-x]");
      const chosen = sel ? sel.getAttribute("data-l") : "";

      qrow.querySelectorAll(".opt").forEach(o => {
        const L = o.getAttribute("data-l");
        o.classList.remove("correct", "wrong");
        if (L === it.ans) o.classList.add("correct");
        else if (L === chosen) o.classList.add("wrong");
      });

      if (chosen === it.ans) {
        correct++;
        v.className = "verdict ok"; v.textContent = "✓ Chính xác";
      } else {
        v.className = "verdict bad";
        v.textContent = chosen
          ? `✗ Sai — đáp án đúng: ${it.ans} (${ex.options[it.ans]})`
          : `Chưa chọn — đáp án đúng: ${it.ans} (${ex.options[it.ans]})`;
      }
      if (it.explain) {
        x.style.display = "block";
        x.innerHTML = `<b>${it.ans} — ${escapeHtml(ex.options[it.ans])}:</b> ${escapeHtml(it.explain)}`;
      }
    });

    $("#checkBtn").textContent = "Xem lại đáp án";
    const total = ex.questions.length;
    saveScore(ex.id, correct, total);

    const r = $("#result");
    const pct = Math.round(correct / total * 100);
    r.textContent = `Kết quả: ${correct}/${total} câu đúng (${pct}%)` +
      (pct === 100 ? " 🎉 Tuyệt vời!" : pct >= 60 ? " 👍 Khá tốt!" : " 💪 Cố lên!");
    r.className = "result show " + (pct >= 80 ? "good" : "mid");
    updateScoreTag();
  }

  function saveScore(id, c, t) {
    const s = JSON.parse(localStorage.getItem("ket_p4_scores") || "{}");
    s[id] = { c, t };
    localStorage.setItem("ket_p4_scores", JSON.stringify(s));
  }
  function updateScoreTag() {
    const s = JSON.parse(localStorage.getItem("ket_p4_scores") || "{}");
    const done = Object.keys(s).length;
    let tot = 0, got = 0;
    Object.values(s).forEach(o => { tot += o.t; got += o.c; });
    $("#scoreTag").textContent = done ? `Đã làm ${done}/${DATA.length} bài · Tổng đúng ${got}/${tot}` : "Chưa làm bài nào";
  }

  // ---- an/hien nghia tieng Viet cua cau hoi ----
  const viToggle = $("#viToggle");
  function applyViState() {
    const hidden = localStorage.getItem("ket_p4_hidevi") === "1";
    document.body.classList.toggle("vi-hidden", hidden);
    viToggle.classList.toggle("on", !hidden);
    viToggle.textContent = hidden ? "🇻🇳 Hiện nghĩa" : "🇻🇳 Ẩn nghĩa";
  }
  viToggle.addEventListener("click", () => {
    const hidden = localStorage.getItem("ket_p4_hidevi") === "1";
    localStorage.setItem("ket_p4_hidevi", hidden ? "0" : "1");
    applyViState();
  });
  applyViState();

  exSel.addEventListener("change", e => { idx = +e.target.value; render(); });
  $("#prevBtn").addEventListener("click", () => { if (idx > 0) { idx--; render(); } });
  $("#nextBtn").addEventListener("click", () => { if (idx < DATA.length - 1) { idx++; render(); } });
  $("#checkBtn").addEventListener("click", check);

  render();
</script>
</body>
</html>
